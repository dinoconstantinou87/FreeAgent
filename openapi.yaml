paths:
  /v2/token_endpoint:
    post:
      tags:
      - _Authorization
      summary: Refresh access token
      description: 'Request an new Access Token using an existing Refresh Token (you''ll
        need to provide a Refresh Token in the request body params)


        https://dev.freeagent.com/docs/oauth/#refreshing-the-access-token'
      operationId: refreshAccessToken
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  example: '{{client_id}}'
                client_secret:
                  type: string
                  example: '{{client_secret}}'
                grant_type:
                  type: string
                  example: refresh_token
                refresh_token:
                  type: string
                  example: ''
            examples:
              Refresh access token:
                value:
                  client_id: '{{client_id}}'
                  client_secret: '{{client_secret}}'
                  grant_type: refresh_token
                  refresh_token: ''
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
      security:
      - oauth2: []
