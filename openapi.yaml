components:
  schemas:
    InvoiceView:
      type: string
      enum:
      - all
      - recent_open_or_overdue
      - open
      - overdue
      - open_or_overdue
      - draft
      - scheduled_to_email
      - thank_you_emails
      - reminder_emails
      - last_N_months
      example: all
    ExpensePayload:
      type: object
      properties:
        category:
          type: string
          example: https://api.freeagent.com/v2/categories/285
        created_at:
          type: string
          example: 2011-08-24 08:10:40+00:00
        currency:
          type: string
          example: USD
        dated_on:
          type: string
          example: 2011-08-24
        description:
          type: string
          example: Some description
        gross_value:
          type: string
          example: '-12.0'
        manual_sales_tax_amount:
          type: string
          example: '0.12'
        sales_tax_rate:
          type: string
          example: '20.0'
        updated_at:
          type: string
          example: 2011-08-24 08:10:40+00:00
        user:
          type: string
          example: https://api.freeagent.com/v2/users/1
    AttachmentPayload:
      type: object
      properties:
        data:
          type: string
          description: Binary data of the file encoded as base64
          example: iVBORw0KGgo...
        file_name:
          type: string
          example: receipt.pdf
        content_type:
          type: string
          enum:
          - image/png
          - image/x-png
          - image/jpeg
          - image/jpg
          - image/gif
          - application/x-pdf
          example: application/x-pdf
        description:
          type: string
          example: Invoice receipt
    InvoiceItemPayload:
      type: object
      properties:
        description:
          type: string
          example: Fishing trip
        item_type:
          type: string
          enum:
          - Hours
          - Days
          - Weeks
          - Months
          - Years
          - Products
          - Services
          - Training
          - Expenses
          - Comment
          - Bills
          - Discount
          - Credit
          - VAT
          - Stock
          example: Hours
        price:
          type: number
          example: 35
        quantity:
          type: number
          example: 6
    Errors:
      type: object
      additionalProperties: true
  responses:
    EmptyResponse:
      description: Error response
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    UnauthorizedResponse:
      description: Unauthorized - Authentication required or invalid credentials
  securitySchemes:
    oauth2:
      type: oauth2
      flows: {}
