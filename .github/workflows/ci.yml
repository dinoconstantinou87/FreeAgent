name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: swiftformat --lint .
      - run: swiftlint lint Sources

  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift build
