    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/invoices/{id}/send_email:
    post:
      tags:
      - Invoices
      summary: Send Invoice Email
      description: Send Invoice Email
      operationId: sendInvoiceEmail
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice:
                  type: object
                  properties:
                    email:
                      $ref: '#/components/schemas/EmailPayload'
            examples:
              Send Invoice Email:
                value:
                  invoice:
                    email:
                      body: Bison bison bison bison bison Bison bison
                      from: Our Company <us@company.com>
                      subject: Testing
                      to: Test Contact <test_contact@example.com>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/invoice_items:
    post:
      tags:
      - Invoices
      summary: Create Invoice Item
      description: Create Invoice Item
      operationId: createInvoiceItem
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice:
                  type: string
                  example: https://api.freeagent.com/v2/invoices/1
                invoice_item:
                  $ref: '#/components/schemas/InvoiceItemPayload'
            examples:
              Create Invoice Item:
                value:
                  invoice: https://api.freeagent.com/v2/invoices/1
                  invoice_item:
                    description: Fishing trip
                    item_type: Hours
                    price: 35
                    quantity: 6
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/invoice_items/{id}:
    put:
      tags:
      - Invoices
      summary: Update Invoice Item
      description: Update Invoice Item
      operationId: updateInvoiceItem
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice_item:
                  $ref: '#/components/schemas/InvoiceItemPayload'
            examples:
              Update Invoice Item:
                value:
                  invoice_item:
                    quantity: 3
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/recurring_invoices:
    get:
      tags:
      - Recurring Invoices
      summary: List all recurring invoices
      description: List all recurring invoices
      operationId: listAllRecurringInvoices
      parameters:
      - name: view
        in: query
        description: Filter recurring invoices by view type
        schema:
          type: string
          enum:
          - draft
          - active
          - inactive
          example: draft
      - name: contact
        in: query
        description: Filter by contact URL
        schema:
          type: string
          example: https://api.freeagent.com/v2/contacts/:id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/recurring_invoices/{id}:
    get:
      tags:
      - Recurring Invoices
      summary: Show Recurring Invoice
      description: Show Recurring Invoice
      operationId: showRecurringInvoice
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
components:
  schemas:
    InvoiceView:
      type: string
      enum:
      - all
