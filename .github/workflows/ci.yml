name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: swiftformat --lint .
      - run: swiftlint lint Sources

  build:
    name: Build
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache swift-openapi-generator
        uses: actions/cache@v4
        with:
          path: .swift-openapi-generator
          key: openapi-generator-1.10.2

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - run: make generate
      - run: swift build
