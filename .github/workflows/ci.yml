name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: swiftformat --lint .
      - run: swiftlint lint Sources

  build:
    name: Build
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Cache swift-openapi-generator
        uses: actions/cache@v5
        with:
          path: .swift-openapi-generator
          key: openapi-generator-1.10.2

      - name: Cache SPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - run: make generate
      - run: swift build
      - run: swift test

  integration:
    name: Integration Tests
    needs: build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed models
        id: detect
        run: |
          changed_files=$(git diff --name-only origin/main -- openapi/)
          if [ -z "$changed_files" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          models=""
          for file in $changed_files; do
            basename=$(basename "$file" .yaml)
            case "$file" in
              openapi/paths/*)
                models="$models,$basename"
                ;;
              openapi/components/schemas/*)
                # Map schema files to their model name (lowercase, strip suffixes)
                model=$(echo "$basename" | sed -E 's/(Response|CreatePayload|UpdatePayload|Payload|View|Item)$//; s/.*/\L&/')
                models="$models,$model"
                ;;
              *)
                # Shared files (e.g. openapi.yaml) — run all tests
                echo "CHANGED_MODELS=all" >> "$GITHUB_ENV"
                exit 0
                ;;
            esac
          done

          # Deduplicate and trim leading comma
          models=$(echo "$models" | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/^,//;s/,$//')
          echo "CHANGED_MODELS=$models" >> "$GITHUB_ENV"

      - name: Skip if no OpenAPI changes
        if: steps.detect.outputs.skip == 'true'
        run: echo "No OpenAPI changes detected, skipping integration tests."

      - name: Cache swift-openapi-generator
        if: steps.detect.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: .swift-openapi-generator
          key: openapi-generator-1.10.2

      - name: Cache SPM build
        if: steps.detect.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Generate API client
        if: steps.detect.outputs.skip != 'true'
        run: make generate

      - name: Refresh access token
        if: steps.detect.outputs.skip != 'true'
        run: |
          response=$(curl -s -X POST "https://api.sandbox.freeagent.com/v2/token_endpoint" \
            -d "grant_type=refresh_token" \
            -d "client_id=${{ secrets.FREEAGENT_AUTH_KEY }}" \
            -d "client_secret=${{ secrets.FREEAGENT_AUTH_SECRET }}" \
            -d "refresh_token=$(echo '${{ secrets.FREEAGENT_CREDENTIAL }}' | jq -r '.refreshToken')")

          access_token=$(echo "$response" | jq -r '.access_token')
          refresh_token=$(echo "$response" | jq -r '.refresh_token')
          expires_in=$(echo "$response" | jq -r '.expires_in')

          if [ "$access_token" = "null" ] || [ -z "$access_token" ]; then
            echo "::error::Failed to refresh access token"
            echo "$response"
            exit 1
          fi

          echo "::add-mask::$access_token"
          echo "::add-mask::$refresh_token"
          echo "FREEAGENT_ACCESS_TOKEN=$access_token" >> "$GITHUB_ENV"

          # Build updated credential JSON for secret rotation (compact single-line)
          expires_at=$(python3 -c "import time; print(time.time() + $expires_in)")
          updated_credential=$(echo '${{ secrets.FREEAGENT_CREDENTIAL }}' | jq -c \
            --arg token "$access_token" \
            --arg refresh "$refresh_token" \
            --arg expires "$expires_at" \
            '.token = $token | .refreshToken = $refresh | .expiresAt = ($expires | tonumber)')
          echo "UPDATED_CREDENTIAL=$updated_credential" >> "$GITHUB_ENV"

      - name: Run integration tests
        if: steps.detect.outputs.skip != 'true'
        env:
          FREEAGENT_ACCESS_TOKEN: ${{ env.FREEAGENT_ACCESS_TOKEN }}
          CHANGED_MODELS: ${{ env.CHANGED_MODELS }}
        run: swift test --filter FreeAgentAPIIntegrationTests

      - name: Update credential secret
        if: steps.detect.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "$UPDATED_CREDENTIAL" | gh secret set FREEAGENT_CREDENTIAL
