name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Lint
        run: |
          swiftformat --lint .
          swiftlint lint Sources

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update version in source
        run: |
          sed -i '' 's/version: ".*"/version: "${{ steps.version.outputs.version }}"/' Sources/FreeAgentCLI/FreeAgentCLI.swift
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/FreeAgentCLI/FreeAgentCLI.swift
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Cache swift-openapi-generator
        uses: actions/cache@v4
        with:
          path: .swift-openapi-generator
          key: openapi-generator-1.10.2

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-release-${{ runner.os }}-

      - name: Generate API client
        run: make generate

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/freeagent \
            .build/x86_64-apple-macosx/release/freeagent \
            -output freeagent
          strip -rSTx freeagent

      - name: Package binary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          tar czf "freeagent-${TAG}-macos-universal.tar.gz" freeagent
          shasum -a 256 "freeagent-${TAG}-macos-universal.tar.gz" > "freeagent-${TAG}-macos-universal.tar.gz.sha256"

      - name: Create tag and GitHub Release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "freeagent-${TAG}-macos-universal.tar.gz" \
            "freeagent-${TAG}-macos-universal.tar.gz.sha256"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(cat "freeagent-${TAG}-macos-universal.tar.gz.sha256" | awk '{print $1}')
          TARBALL_URL="https://github.com/dinoconstantinou87/FreeAgent/releases/download/${TAG}/freeagent-${TAG}-macos-universal.tar.gz"

          git clone https://x-access-token:${GH_TOKEN}@github.com/dinoconstantinou87/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Formula/freeagent.rb <<FORMULA
          class Freeagent < Formula
            desc "Command-line interface for the FreeAgent accounting API"
            homepage "https://github.com/dinoconstantinou87/FreeAgent"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "MIT"

            depends_on :macos

            def install
              bin.install "freeagent"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/freeagent --version")
            end
          end
          FORMULA
          sed -i '' 's/^          //' Formula/freeagent.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "update-freeagent-${VERSION}"
          git add Formula/freeagent.rb
          git commit -m "Update freeagent to ${VERSION}"
          git push origin "update-freeagent-${VERSION}"

          gh pr create \
            --repo dinoconstantinou87/homebrew-tap \
            --title "Update freeagent to ${VERSION}" \
            --body "Automated update from [FreeAgent release ${TAG}](https://github.com/dinoconstantinou87/FreeAgent/releases/tag/${TAG})" \
            --base main \
            --head "update-freeagent-${VERSION}"
