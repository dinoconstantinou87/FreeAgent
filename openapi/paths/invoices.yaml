list:
  get:
    tags:
    - Invoices
    summary: List Invoices
    description: List Invoices
    operationId: listInvoices
    parameters:
    - name: nested_invoice_items
      in: query
      description: Include nested invoice items in response
      schema:
        type: boolean
        example: true
    - name: contact
      in: query
      description: Filter invoices by contact URL
      schema:
        type: string
        example: https://api.freeagent.com/v2/contacts/:id
    - name: project
      in: query
      description: Filter invoices by project URL
      schema:
        type: string
        example: https://api.freeagent.com/v2/projects/:id
    - name: currency
      in: query
      description: Filter invoices by currency code
      schema:
        type: string
        example: USD
    - name: view
      in: query
      description: Filter invoices by view type
      schema:
        $ref: '#/components/schemas/InvoiceView'
    - name: updated_since
      in: query
      description: Show invoices updated since this date (YYYY-MM-DD)
      schema:
        type: string
        example: 2018-01-01
    - name: sort
      in: query
      description: Sort invoices by specified field
      schema:
        type: string
        enum:
        - updated_at
        - created_at
        example: updated_at
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      default:
        $ref: '#/components/responses/ErrorResponse'
      '401':
        $ref: '#/components/responses/UnauthorizedResponse'
  post:
    tags:
    - Invoices
    summary: Create Invoice
    description: Create Invoice
    operationId: createInvoice
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              invoice:
                $ref: '#/components/schemas/InvoiceCreatePayload'
          examples:
            Create Invoice:
              value:
                invoice:
                  always_show_bic_and_iban: false
                  contact: https://api.freeagent.com/v2/contacts/:id
                  currency: GBP
                  dated_on: 2019-08-18
                  due_on: 2019-09-18
                  omit_header: false
                  payment_terms_in_days: 30
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      default:
        $ref: '#/components/responses/ErrorResponse'
      '401':
        $ref: '#/components/responses/UnauthorizedResponse'
