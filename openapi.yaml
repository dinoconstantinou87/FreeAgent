openapi: 3.0.3
info:
  title: FreeAgent
  version: 1.0.0
  contact: {}
servers:
- url: https://api.freeagent.com
  description: Production
- url: https://api.sandbox.freeagent.com
  description: Sandbox
paths:
  /v2/bank_accounts:
    get:
      tags:
      - Bank Accounts
      summary: List Bank Accounts
      description: List Bank Accounts
      operationId: listBankAccounts
      parameters:
      - name: view
        in: query
        schema:
          type: string
          example: standard_bank_accounts
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/bank_accounts/{id}:
    get:
      tags:
      - Bank Accounts
      summary: Show Bank Account
      description: Show Bank Account
      operationId: showBankAccount
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/bank_transaction_explanations:
    get:
      tags:
      - Bank Transaction Explanations
      summary: List all bank transaction explanations
      description: List all bank transaction explanations
      operationId: listAllBankTransactionExplanations
      parameters:
      - name: from_date
        in: query
        schema:
          type: string
          example: 2018-01-01
      - name: to_date
        in: query
        schema:
          type: string
          example: 2018-01-01
      - name: updated_since
        in: query
        schema:
          type: string
          example: 2018-01-01
      - name: bank_account
        in: query
        schema:
          type: string
          example: https://api.freeagent.com/v2/bank_accounts/:id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags:
      - Bank Transaction Explanations
      summary: Create a bank transaction explanation
      description: Create a bank transaction explanation
      operationId: createABankTransactionExplanation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bank_transaction_explanation:
                  $ref: '#/components/schemas/BankTransactionExplanationCreatePayload'
            examples:
              Create a bank transaction explanation:
                value:
                  bank_transaction_explanation:
                    attachment:
                      data: iVBORw0KGgo...
                      file_name: receipt.pdf
                      content_type: application/x-pdf
                    bank_account: https://api.freeagent.com/v2/bank_accounts/1
                    bank_transaction: https://api.freeagent.com/v2/bank_transactions/8
                    category: https://api.freeagent.com/v2/categories/285
                    dated_on: 2010-05-01
                    description: harness end-to-end e-business
                    gross_value: '-730.0'
                    project: https://api.freeagent.com/v2/projects/1
                    rebill_factor: '0.25'
                    rebill_type: markup
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/bank_transaction_explanations/{id}:
    get:
      tags:
      - Bank Transaction Explanations
      summary: Get a single bank transaction explanation
      description: Get a single bank transaction explanation
      operationId: getASingleBankTransactionExplanation
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    put:
      tags:
      - Bank Transaction Explanations
      summary: Update a bank transaction explanation
      description: Update a bank transaction explanation
      operationId: updateABankTransactionExplanation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bank_transaction_explanation:
                  $ref: '#/components/schemas/BankTransactionExplanationUpdatePayload'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    delete:
      tags:
      - Bank Transaction Explanations
      summary: Delete a bank transaction explanation
      description: Delete a bank transaction explanation
      operationId: deleteABankTransactionExplanation
      responses:
        '200':
          description: Success
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/bank_transactions:
    get:
      tags:
      - Bank Transactions
      summary: List all bank transactions under a certain bank account
      description: List all bank transactions under a certain bank account
      operationId: listAllBankTransactionsUnderACertainBankAccount
      parameters:
      - name: bank_account
        in: query
        schema:
          type: string
          example: https://api.freeagent.com/v2/bank_accounts/1
      - name: from_date
        in: query
        schema:
          type: string
          example: 2018-01-01
      - name: to_date
        in: query
        schema:
          type: string
          example: 2018-01-01
      - name: updated_since
        in: query
        schema:
          type: string
          example: 2018-01-01
      - name: view
        in: query
        schema:
          type: string
          example: all
      - name: last_uploaded
        in: query
        schema:
          type: string
          example: 'true'
      - name: page
        in: query
        schema:
          type: integer
          example: 1
      - name: per_page
        in: query
        schema:
          type: integer
          example: 100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/bank_transactions/{id}:
    get:
      tags:
      - Bank Transactions
      summary: Get a single bank transaction
      description: Get a single bank transaction
      operationId: getASingleBankTransaction
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/bills:
    post:
      tags:
      - Bills
      summary: Create Bill
      description: Create Bill
      operationId: createBill
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bill:
                  $ref: '#/components/schemas/BillCreatePayload'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/categories:
    get:
      tags:
      - Categories
      summary: List Categories
      description: List Categories
      operationId: listCategories
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/company:
    get:
      tags:
      - Company
      summary: Company Details
      description: Company Details
      operationId: companyDetails
      responses:
        '200':
          description: Company details
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/contacts:
    get:
      tags:
      - Contacts
      summary: List Contacts
      description: List Contacts
      operationId: listContacts
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags:
      - Contacts
      summary: Create Contact
      description: Create Contact
      operationId: createContact
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contact:
                  $ref: '#/components/schemas/ContactCreatePayload'
            examples:
              Create Contact:
                value:
                  contact:
                    organisation_name: Testington & Sons Ltd
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/expenses:
    get:
      tags:
      - Expenses
      summary: List all expenses
      description: List all expenses
      operationId: listAllExpenses
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags:
      - Expenses
      summary: Create expense
      description: Create expense
      operationId: createExpense
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                expense:
                  $ref: '#/components/schemas/ExpensePayload'
                expenses:
                  type: array
                  items:
                    $ref: '#/components/schemas/ExpensePayload'
                  example:
                  - category: https://api.freeagent.com/v2/categories/285
                    created_at: 2011-08-24 08:10:40+00:00
                    dated_on: 2011-08-24
                    description: Some description
                    gross_value: '-12.0'
                    manual_sales_tax_amount: '0.12'
                    sales_tax_rate: '20.0'
                    updated_at: 2011-08-24 08:10:40+00:00
                    user: https://api.freeagent.com/v2/users/1
                  - category: https://api.freeagent.com/v2/categories/285
                    created_at: 2011-08-25 08:10:40+00:00
                    dated_on: 2011-08-24
                    description: Some description
                    gross_value: '-5.0'
                    manual_sales_tax_amount: '0.12'
                    sales_tax_rate: '20.0'
                    updated_at: 2011-08-25 08:10:40+00:00
                    user: https://api.freeagent.com/v2/users/1
            examples:
              Batch create expenses:
                value:
                  expenses:
                  - category: https://api.freeagent.com/v2/categories/285
                    created_at: 2011-08-24 08:10:40+00:00
                    dated_on: 2011-08-24
                    description: Some description
                    gross_value: '-12.0'
                    manual_sales_tax_amount: '0.12'
                    sales_tax_rate: '20.0'
                    updated_at: 2011-08-24 08:10:40+00:00
                    user: https://api.freeagent.com/v2/users/1
                  - category: https://api.freeagent.com/v2/categories/285
                    created_at: 2011-08-25 08:10:40+00:00
                    dated_on: 2011-08-24
                    description: Some description
                    gross_value: '-5.0'
                    manual_sales_tax_amount: '0.12'
                    sales_tax_rate: '20.0'
                    updated_at: 2011-08-25 08:10:40+00:00
                    user: https://api.freeagent.com/v2/users/1
              Create expense:
                value:
                  expense:
                    category: https://api.freeagent.com/v2/categories/285
                    created_at: 2011-08-24 08:10:40+00:00
                    currency: USD
                    dated_on: 2011-08-24
                    description: Some description
                    gross_value: '-20.0'
                    manual_sales_tax_amount: '0.12'
                    native_gross_value: '-12.0'
                    native_sales_tax_value: '-0.12'
                    sales_tax_rate: '1.0'
                    sales_tax_value: '-0.2'
                    updated_at: 2011-08-24 08:10:40+00:00
                    user: https://api.freeagent.com/v2/users/:id
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/expenses/{id}:
    get:
      tags:
      - Expenses
      summary: Get a single expense
      description: Get a single expense
      operationId: getASingleExpense
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/invoices/{id}/transitions/mark_as_sent:
    put:
      tags:
      - Invoices
      - Invoice Transitions
      summary: Mark invoice as sent
      description: Mark invoice as sent
      operationId: markInvoiceAsSent
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/invoices/{id}/transitions/mark_as_cancelled:
    put:
      tags:
      - Invoices
      - Invoice Transitions
      summary: Mark invoice as cancelled
      description: Mark invoice as cancelled
      operationId: markInvoiceAsCancelled
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/invoices/{id}/transitions/mark_as_scheduled:
    put:
      tags:
      - Invoices
      - Invoice Transitions
      summary: Mark invoice as scheduled
      description: Mark invoice as scheduled
      operationId: markInvoiceAsScheduled
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/invoices/{id}/transitions/mark_as_draft:
    put:
      tags:
      - Invoices
      - Invoice Transitions
      summary: Mark invoice as draft
      description: Mark invoice as draft
      operationId: markInvoiceAsDraft
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/invoices:
    get:
      tags:
      - Invoices
      summary: List Invoices
      description: List Invoices
      operationId: listInvoices
      parameters:
      - name: nested_invoice_items
        in: query
        description: Include nested invoice items in response
        schema:
          type: boolean
          example: true
      - name: contact
        in: query
        description: Filter invoices by contact URL
        schema:
          type: string
          example: https://api.freeagent.com/v2/contacts/:id
      - name: project
        in: query
        description: Filter invoices by project URL
        schema:
          type: string
          example: https://api.freeagent.com/v2/projects/:id
      - name: currency
        in: query
        description: Filter invoices by currency code
        schema:
          type: string
          example: USD
      - name: view
        in: query
        description: Filter invoices by view type
        schema:
          $ref: '#/components/schemas/InvoiceView'
      - name: updated_since
        in: query
        description: Show invoices updated since this date (YYYY-MM-DD)
        schema:
          type: string
          example: 2018-01-01
      - name: sort
        in: query
        description: Sort invoices by specified field
        schema:
          type: string
          enum:
          - updated_at
          - created_at
          example: updated_at
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags:
      - Invoices
      summary: Create Invoice
      description: Create Invoice
      operationId: createInvoice
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice:
                  $ref: '#/components/schemas/InvoiceCreatePayload'
            examples:
              Create Invoice:
                value:
                  invoice:
                    always_show_bic_and_iban: false
                    contact: https://api.freeagent.com/v2/contacts/:id
                    currency: GBP
                    dated_on: 2019-08-18
                    due_on: 2019-09-18
                    omit_header: false
                    payment_terms_in_days: 30
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/invoices/{id}:
    get:
      tags:
      - Invoices
      summary: Show Invoice
      description: Show Invoice
      operationId: showInvoice
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    put:
      tags:
      - Invoices
      summary: Update Invoice
      description: Update Invoice
      operationId: updateInvoice
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice:
                  $ref: '#/components/schemas/InvoiceUpdatePayload'
            examples:
              Update Invoice:
                value:
                  invoice:
                    notes: An example of some additional text.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    delete:
      tags:
      - Invoices
      summary: Delete Invoice
      description: Delete Invoice
      operationId: deleteInvoice
      responses:
        '200':
          description: Success
        '409':
          $ref: '#/components/responses/EmptyResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: ''
  /v2/invoices/timeline:
    get:
      tags:
      - Invoices
      summary: Get invoice timeline
      description: Get invoice timeline
      operationId: getInvoiceTimeline
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /v2/invoices/{id}/pdf:
    get:
      tags:
      - Invoices
      summary: Show Invoice as PDF
      description: Show Invoice as PDF
      operationId: showInvoiceAsPdf
      responses:
        '200':
          description: Success
